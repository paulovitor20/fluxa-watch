name: fluxa_watch
description: "FLUXA Watch - Seu universo de entretenimento."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  #=========================
  # Backend
  #=========================
  supabase_flutter: ^2.9.1

  #=========================
  # State Management
  #=========================
  flutter_riverpod: ^2.6.1

  #=========================
  # Navigation
  #=========================
  go_router: ^16.0.0

  #=========================
  # HTTP
  #=========================
  dio: ^5.8.0+1

  #=========================
  # Environment
  #=========================
  flutter_dotenv: ^5.2.1

  #=========================
  # Images
  #=========================
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.0

  #=========================
  # Fonts
  #=========================
  google_fonts: ^6.3.1

  #=========================
  # Animations
  #=========================
  flutter_animate: ^4.5.2
  lottie: ^3.3.1

  #=========================
  # Local Database
  #=========================
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  #=========================
  # Utils
  #=========================
  intl: ^0.20.2
  equatable: ^2.0.7
  uuid: ^4.5.1

  #=========================
  # Device
  #=========================
  connectivity_plus: ^7.0.0
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2
  share_plus: ^11.0.0

  #=========================
  # Serialization
  #=========================
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.5.4
  json_serializable: ^6.9.5

flutter:

  uses-material-design: true

  assets:
    - .env
    - assets/
    - assets/images/
    - assets/icons/
    - assets/logos/
    - assets/animations/